<!DOCTYPE html>
<html lang="ca">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CP01LYD3X5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CP01LYD3X5');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="{{ site.baseurl }}/kokoro-purple-1.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>
  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('mobile-menu-btn') || document.querySelector('.mobile-menu-btn');
      var nav = document.getElementById('nav-menu') || document.querySelector('.nav-menu');
      if (!btn || !nav) return;
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var isOpen = nav.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
      var linksWrap = document.getElementById('nav-links') || nav.querySelector('.nav-links');
      if (linksWrap) {
        var links = linksWrap.querySelectorAll('a');
        for (var i = 0; i < links.length; i++) {
          links[i].addEventListener('click', function() {
            nav.classList.remove('is-open');
            btn.setAttribute('aria-expanded', 'false');
          });
        }
      }
    });
  </script>
</body>
</html>
